name: Security Check

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security-scan:
    name: 🔒 Security & Privacy Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run security scan
        run: bash scripts/security-scan.sh --strict

  skill-lint:
    name: 📐 SKILL Design Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint all skills
        run: bash scripts/skill-lint.sh
